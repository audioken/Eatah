name: Deploy Eatah.WebClient to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish WebClient
        run: dotnet publish src/Eatah.WebClient/Eatah.WebClient.csproj -c Release -o publish

      - name: Disable Jekyll (allow _framework/ to be served)
        run: touch publish/wwwroot/.nojekyll

      - name: Fix base href for GitHub Pages
        run: sed -i 's|<base href="/" />|<base href="/Eatah/" />|g' publish/wwwroot/index.html

      - name: Copy index.html to 404.html (SPA-routing fix)
        run: |
          cp publish/wwwroot/index.html publish/wwwroot/404.html
          # Inject a redirect script at the top of 404.html so GitHub Pages
          # stores the original path in sessionStorage before reloading index.html.
          sed -i 's|<head>|<head><script>sessionStorage.setItem("spa-redirect",location.pathname+location.search+location.hash);location.replace("/Eatah/");</script>|' publish/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
