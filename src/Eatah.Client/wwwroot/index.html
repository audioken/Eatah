<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	<title>Eatah</title>
	<base href="/" />
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			theme: {
				extend: {
					colors: {
						brand: {
							50: '#f0fdf4',
							100: '#dcfce7',
							500: '#22c55e',
							600: '#16a34a',
							700: '#15803d'
						},
						meat: '#dc2626',
						fish: '#2563eb',
						vegetarian: '#16a34a',
						vegan: '#65a30d'
					}
				}
			}
		}
	</script>
	<link href="css/app.css" rel="stylesheet" />
	<link href="Eatah.Client.styles.css" rel="stylesheet" />
</head>

<body>

	<div id="app">Loading...</div>

	<div id="blazor-error-ui">
		An unhandled error has occurred.
		<a href="" class="reload">Reload</a>
		<a class="dismiss">🗙</a>
	</div>

	<script>
		// Called from MAUI on Android where env(safe-area-inset-*) is not forwarded by WebView.
		// On iOS the CSS env() fallback is used instead (viewport-fit=cover handles it natively).
		window.applyInsets = function (top, bottom) {
			document.documentElement.style.setProperty('--safe-area-inset-top', top + 'px');
			document.documentElement.style.setProperty('--safe-area-inset-bottom', bottom + 'px');
		};
	</script>

	<script src="_framework/blazor.webview.js" autostart="false"></script>

</body>

</html>
