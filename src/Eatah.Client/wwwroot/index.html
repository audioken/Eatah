<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
	<title>Eatah</title>
	<base href="/" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" />
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			theme: {
				extend: {
					fontFamily: {
						kanit: ['Kanit', 'sans-serif']
					},
					colors: {
						brand: {
							50: '#f0fdf4',
							100: '#dcfce7',
							500: '#22c55e',
							600: '#16a34a',
							700: '#15803d'
						},
						meat: '#A13A3A',
						fish: '#005ED9',
						poultry: '#D98D00',
						vegetarian: '#3C8F3A',
						vegan: '#AC279D',
						dayCardText: '#333E2F'
					}
				}
			}
		}
	</script>
	<link href="css/app.css" rel="stylesheet" />
	<link href="Eatah.Client.styles.css" rel="stylesheet" />
</head>

<body>

	<div id="app">Loading...</div>

	<div id="blazor-error-ui">
		An unhandled error has occurred.
		<a href="" class="reload">Reload</a>
		<a class="dismiss">🗙</a>
	</div>

	<script>
		// Called from MAUI on Android where env(safe-area-inset-*) is not forwarded by WebView.
		// On iOS the CSS env() fallback is used instead (viewport-fit=cover handles it natively).
		window.applyInsets = function (top, bottom) {
			document.documentElement.style.setProperty('--safe-area-inset-top', top + 'px');
			document.documentElement.style.setProperty('--safe-area-inset-bottom', bottom + 'px');
		};
	</script>

	<script src="_framework/blazor.webview.js" autostart="false"></script>
	<script src="js/chat.js"></script>

</body>

</html>
