<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Eatah</title>
    <base href="/" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#5AAE00" />
    <meta name="application-name" content="Eatah" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Eatah" />
    <link rel="apple-touch-icon" href="icons/app-icon.svg" />
    <link rel="icon" type="image/svg+xml" href="icons/app-icon.svg" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { kanit: ['Kanit', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d'
                        },
                        meat: '#A13A3A',
                        fish: '#005ED9',
                        poultry: '#D98D00',
                        vegetarian: '#3C8F3A',
                        vegan: '#AC279D',
                        dayCardText: '#333E2F'
                    }
                }
            }
        }
    </script>
    <link href="css/app.css" rel="stylesheet" />
    <link href="Eatah.WebClient.styles.css" rel="stylesheet" />
</head>

<body>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script>
        // Compat shim for the MAUI path that calls window.applyInsets(top, bottom).
        // In a browser PWA we rely on CSS env(safe-area-inset-*) directly.
        window.applyInsets = function (top, bottom) {
            document.documentElement.style.setProperty('--safe-area-inset-top', top + 'px');
            document.documentElement.style.setProperty('--safe-area-inset-bottom', bottom + 'px');
        };
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker && navigator.serviceWorker.register('service-worker.js');</script>

</body>

</html>
