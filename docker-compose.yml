services:
  postgres:
    image: postgres:16-alpine
    container_name: eatah-postgres
    environment:
      POSTGRES_DB: eatah
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - eatah_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eatah"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/Eatah.Api/Dockerfile
    container_name: eatah-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=eatah;Username=postgres;Password=postgres"
      AiSettings__ApiKey: "${AI_API_KEY:-}"
    ports:
      - "8080:8080"

volumes:
  eatah_pgdata:
